    /* Header */
    .header {
      background-color: lightblue;
      color: black;
      padding: 30px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 3px solid #000;

    .header img {
      max-height: 100px;
      width: auto;
      display: block;
      margin: 0 auto 15px;
    }

    nav {
      margin-top: 15px;
    }

    nav a {
      color: white;
      font-size: 30px;
      margin: 0 25px;
      text-decoration: none;
      position: relative;
      display: inline-block;
      padding-bottom: 6px;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #333;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 3px;
      background-color: black;
      transition: width 0.4s ease, left 0.4s ease;
    }

    nav a:hover::after {
      width: 100%;
      left: 0;
    }

    /* Main content – grows to fill space */
    main {
